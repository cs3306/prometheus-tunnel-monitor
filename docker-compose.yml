networks:
  devtools_shared:
    external: true

services:

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    networks:
      - devtools_shared
    extra_hosts:
      - "host-gateway:host-gateway"
    ports:
      - "127.0.0.1:36602:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=90d'
      - '--web.external-url=/prometheus'
      - '--web.route-prefix=/prometheus'

  alertmanager:
    image: prom/alertmanager:latest
    container_name: alertmanager
    restart: unless-stopped
    networks:
      - devtools_shared
    ports:
      - "127.0.0.1:36603:9093"
    volumes:
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--web.listen-address=0.0.0.0:9093'
      - '--web.external-url=http://127.0.0.1:36603/alertmanager'
      - '--web.route-prefix=/alertmanager'

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    networks:
      - devtools_shared
    ports:
      - "127.0.0.1:36601:3000"
    environment:
      - GF_SERVER_ROOT_URL=https://monitor.example.com/grafana/
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
      - GF_SECURITY_ADMIN_PASSWORD=${GF_ADMIN_PASSWORD}
    volumes:
      - grafana_data:/var/lib/grafana

  tgbot:
    build: ./tgbot
    container_name: tgbot
    restart: unless-stopped
    networks:
      - devtools_shared
    ports:
      - "127.0.0.1:36605:8000"
    environment:
      - TG_BOT_TOKEN=${TG_BOT_TOKEN}
      - TG_CHAT_ID=${TG_CHAT_ID}
      - PROMETHEUS_URL=http://prometheus:9090/prometheus
    volumes:
      - ./tgbot/billing.json:/app/billing.json:ro

volumes:
  prometheus_data:
  alertmanager_data:
  grafana_data:
